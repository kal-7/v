<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Birthday Wishes Gallery 🎂</title>

    <link rel="stylesheet" href="style.css">

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

    <style>

    body{
      padding:30px;
    }

    .gallery-title{
      text-align:center;
      color:#ff4f87;
      margin-bottom:30px;
      font-size:40px;
    }

    .gallery-grid{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
      gap:20px;
    }

    .card{
      background:white;
      border-radius:25px;
      overflow:hidden;
      padding:15px;
      box-shadow:0 8px 20px rgba(0,0,0,0.1);
    }

    .card img{
      width:100%;
      border-radius:18px;
    }

    .download-btn{
      display:block;
      margin-top:15px;
      text-align:center;
      background:linear-gradient(90deg,#ff4f87,#ff8c42);
      color:white;
      padding:12px;
      border-radius:15px;
      text-decoration:none;
      font-weight:bold;
    }

  </style>
</head>

<body>

<h1 class="gallery-title">
    🎉 Birthday Wishes Gallery 🎂
</h1>

<div class="gallery-grid" id="galleryGrid"></div>

<script src="gallery.js"></script>

</body>
</html>
