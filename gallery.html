<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Birthday Wishes Gallery 🎂</title>

    <link rel="stylesheet" href="style.css">

    <!-- Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

    <!-- jsPDF -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

    <style>

    body{
      padding:30px;
      background:linear-gradient(135deg,#ffdce8,#fff8c4);
      min-height:100vh;
    }

    .top-bar{
      display:flex;
      justify-content:space-between;
      align-items:center;
      margin-bottom:30px;
      gap:20px;
      flex-wrap:wrap;
    }

    .gallery-title{
      color:#ff4f87;
      font-size:40px;
    }

    .download-all-btn{
      padding:14px 24px;
      border:none;
      border-radius:18px;
      background:linear-gradient(90deg,#ff4f87,#ff8c42);
      color:white;
      font-size:16px;
      font-weight:bold;
      cursor:pointer;
      box-shadow:0 8px 20px rgba(0,0,0,0.1);
    }

    .gallery-grid{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
      gap:20px;
    }

    .card{
      background:white;
      border-radius:25px;
      overflow:hidden;
      padding:15px;
      box-shadow:0 8px 20px rgba(0,0,0,0.1);
    }

    .card img{
      width:100%;
      border-radius:18px;
    }

  </style>
</head>

<body>

<div class="top-bar">

    <h1 class="gallery-title">
        🎉 Birthday Wishes Gallery 🎂
    </h1>

    <button class="download-all-btn" onclick="downloadAllAsPDF()">
        ⬇ Download All Wishes PDF
    </button>
    <div class="gallery-grid" id="galleryGrid"></div>

</div>


<script src="gallery.js"></script>

</body>
</html>
